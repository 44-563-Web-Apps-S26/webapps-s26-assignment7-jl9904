<!DOCTYPE html>
<html> 
	<head>
		<title>Dynamic List Builder</title>
	<style>
        .flex-container {
            display: flex;
            flex-direction: row;
            background-color: red;
        }

        .divlist {
            background-color: #f1f1f1;
            margin: 10px;
            padding: 20px;
            font-size: 30px;
        }

        /* Responsive layout */
        @media (max-width: 600px) {
            .flex-container {
                flex-direction: column;
                background-color: green;
            }
        }
    </style>
</style></head>



<body>
    <h2>Jaden builds list with divs</h2>

    <input type="text" id="listInput" placeholder="Enter text here">

    <button onclick="makeNewDiv()">Add end</button>
    <button onclick="addFront()">Add front</button>
    <button onclick="remove()">Remove</button>

    <p>Use the buttons to modify the list of divs below.</p>

    <div class="flex-container" id="target">
        <div class="divlist">row item 1</div>
        <div class="divlist">row item 2</div>
        <div class="divlist">row item 3</div>
    </div>

</body>

<script>
    function makeNewDiv() {
        let inputValue = document.getElementById("listInput").value;
        let element = document.createElement("div");
        element.innerHTML = inputValue;
        element.className = "divlist";

        let container = document.getElementById('target');
        container.appendChild(element);
    }
	function addFront() {
        let inputValue = document.getElementById("listInput").value;
        let element = document.createElement("div");
        element.innerHTML = inputValue;
        element.className = "divlist";

        let container = document.getElementById('target');
        container.insertBefore(element, container.firstChild);
    }
	function remove() {
        let divListItems = document.getElementsByClassName("divlist");
        let length = divListItems.length;

        if (length > 0) {
            if (length > 1) {
                divListItems[1].remove();
            } else {
                divListItems[0].remove();
            }
        }
	}
</script>
</html>
