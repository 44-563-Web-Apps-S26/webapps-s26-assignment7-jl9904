<!DOCTYPE html>
<html> 
	<head>
		<title>Dynamic List Builder</title>
	<style>
        .flex-container {
            display: flex;
            flex-direction: row;
            background-color: red;
        }

        .divlist {
            background-color: #f1f1f1;
            margin: 10px;
            padding: 20px;
            font-size: 30px;
        }

        /* Responsive layout */
        @media (max-width: 600px) {
            .flex-container {
                flex-direction: column;
                background-color: green;
            }
        }
    </style>
</style></head>



<body>
    <h2>Jaden builds list with divs</h2>

    <input type="text" id="listInput" placeholder="Enter text here">

    <button onclick="makeNewDiv()">Add end</button>

    <p>Press the button to create a new element of type div and then add it to the container.</p>

    <div class="flex-container" id="target">
        <div class="divlist">row item 1</div>
        <div class="divlist">row item 2</div>
        <div class="divlist">row item 3</div>
    </div>

</body>

<script>
    function makeNewDiv() {
        let inputValue = document.getElementById("listInput").value;
        let element = document.createElement("div");
        element.innerHTML = inputValue;
        element.className = "divlist";

        let container = document.getElementById('target');
        container.appendChild(element);
    }
</script>
</html>
