<!DOCTYPE html>
<html lang="en">
<head>
  <title>Reflex Timer Test</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
  <style>
    body { padding: 20px; }
    .display-area { margin: 20px 0; font-weight: bold; }
  </style>
</head>
<body>

  <h2>Jaden Lopez reflexes</h2>

  <div class="container">
    <div id="target" class="display-area">Your time</div>
    <div id="counter" class="display-area">Count</div>

    <div class="mt-3">
        <button type="button" class="btn btn-success" onclick="beginTime()">Go</button>
        
        <button type="button" class="btn btn-danger" onclick="recordTime()">Halt</button>
    </div>
  </div>

  <script> 
    let haltTime = undefined;
    function recordTime() {
        haltTime = Date.now();
        console.log("Halt time recorded: " + haltTime);
    }

    function beginTime() {
        haltTime = undefined;

        for (let i = 0; i < 6; i++) {
            setTimeout(() => {
                document.getElementById('counter').innerHTML = "Count: " + i;
            }, (5 - i) * 1000);
        }

        setTimeout(() => {
            if (haltTime === undefined) {
                document.getElementById('target').innerHTML = "Not soon enough";
            } else {
                let targetTime = Date.now();
                let elapsedTime = targetTime - haltTime; 
                document.getElementById('target').innerHTML = "Time was " + elapsedTime + "ms";
            }
        }, 5000);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
